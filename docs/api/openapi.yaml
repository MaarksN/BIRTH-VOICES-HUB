openapi: 3.1.0
info:
  title: Birth Voices Hub API
  description: Enterprise API for managing multi-tenant workflows, AI agents, and voice interactions.
  version: 1.0.0
servers:
  - url: http://localhost:5001/api
    description: Local Development Server
  - url: https://api.birthvoiceshub.com/api
    description: Production Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        companyName:
          type: string
        tenantId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    Workflow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [draft, active, archived]
        nodes:
          type: array
        edges:
          type: array

    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        model:
          type: string
        configuration:
          type: object

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: string

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      summary: User Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials

  /workflows:
    get:
      summary: List Workflows
      responses:
        '200':
          description: A list of workflows for the current tenant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Workflow'
    post:
      summary: Create a Workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Workflow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'

  /agents:
    get:
      summary: List Agents
      responses:
        '200':
          description: List of AI agents for the current tenant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'
    post:
      summary: Create an Agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, model]
              properties:
                name:
                  type: string
                model:
                  type: string
                configuration:
                  type: object
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'

  /voice/initiate:
    post:
      summary: Initiate Voice Call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agentId, targetNumber]
              properties:
                agentId:
                  type: string
                  format: uuid
                targetNumber:
                  type: string
                context:
                  type: object
      responses:
        '200':
          description: Call initiated successfully

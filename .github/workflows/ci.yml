name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  NODE_VERSION: '20.x'
  # Secrets will override these if defined
  DATABASE_URL: "postgresql://devuser:devpassword@localhost:5432/birthvoices"
  REDIS_URL: "redis://localhost:6379"
  ALLOWED_ORIGINS: "http://localhost:3000"
  JWT_SECRET: "ci_jwt_secret_do_not_use_in_production"
  REFRESH_TOKEN_SECRET: "ci_refresh_secret_do_not_use_in_production"
  NODE_ENV: "test"

jobs:
  validate-and-build:
    name: Validate, Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: devuser
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: birthvoices
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Prisma Generate
      run: npx prisma generate

    - name: Prisma Migrate Check
      run: npx prisma migrate deploy

    - name: Prisma Seed
      run: npx prisma db seed

    - name: Lint
      run: npm run lint

    - name: Typecheck
      run: npm run typecheck

    - name: Run Tests
      run: npm run test

    - name: Build Application
      run: npm run build

  docker-build:
    name: Docker Build & Push Artifact
    runs-on: ubuntu-latest
    needs: validate-and-build

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t birthvoices-app:latest .

    - name: Save Docker Image Artifact
      run: docker save birthvoices-app:latest > birthvoices-app.tar

    - name: Upload Docker Artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: birthvoices-app.tar
        retention-days: 1

name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
      - release/*
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: birthvoices-app
  GAR_LOCATION: us-central1-docker.pkg.dev
  REPOSITORY: birthvoices-repo
  IMAGE_NAME: birthvoices-app

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required secrets are configured
        run: |
          missing=()
          [ -z "${{ secrets.GCP_PROJECT_ID }}" ] && missing+=("GCP_PROJECT_ID")
          [ -z "${{ secrets.GCP_SA_KEY }}${{ secrets.GCP_CREDENTIALS }}" ] && missing+=("GCP_SA_KEY (or GCP_CREDENTIALS)")
          [ -z "${{ secrets.PRODUCTION_DATABASE_URL }}" ] && missing+=("PRODUCTION_DATABASE_URL")
          [ -z "${{ secrets.PRODUCTION_REDIS_URL }}" ] && missing+=("PRODUCTION_REDIS_URL")
          [ -z "${{ secrets.JWT_SECRET }}" ] && missing+=("JWT_SECRET")
          [ -z "${{ secrets.REFRESH_TOKEN_SECRET }}" ] && missing+=("REFRESH_TOKEN_SECRET")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required GitHub Actions secrets: ${missing[*]}. Configure them in Settings > Secrets and variables > Actions before this workflow can deploy."
            exit 1
          fi

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY || secrets.GCP_CREDENTIALS }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }} --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_PATH="${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_PATH" .
          docker push "$IMAGE_PATH"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          env_vars: |
            NODE_ENV=production
            DATABASE_URL=${{ secrets.PRODUCTION_DATABASE_URL }}
            REDIS_URL=${{ secrets.PRODUCTION_REDIS_URL }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}
            ALLOWED_ORIGINS=${{ secrets.PRODUCTION_ALLOWED_ORIGINS }}

      - name: Show deployed service URL
        run: echo "Service URL => ${{ steps.deploy.outputs.url }}"
